name: Fetch Asian Index Data

on:
  schedule:
    - cron: '*/5 0-8 * * 1-5'     # Mon-Fri 00:00-08:55 UTC
    - cron: '0 9 * * 1-5'          # final run 09:00 UTC
    - cron: '*/5 22-23 * * 0'     # Sunday evening for Monday Tokyo open
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data
        run: python scripts/fetch_fast.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
